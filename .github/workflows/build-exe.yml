name: 通用 Python 打包 EXE

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: '主脚本文件名（如 main.py）'
        required: true
        type: string
      exe_name:
        description: '生成的 exe 名称'
        required: false
        type: string
        default: 'output'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          } else {
            pip install pyinstaller python-docx
          }

      - name: 打包 EXE
        run: |
          pyinstaller --onefile --windowed --name "${{ inputs.exe_name }}" "${{ inputs.script_name }}"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.exe_name }}
          path: dist/${{ inputs.exe_name }}.exe

      - name: 打包后清除源码
        shell: bash
        run: |
          git config user.name "fyjn4r5"
          git config user.email "fyjn4r5@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git rm -f "${{ inputs.script_name }}" requirements.txt 2>/dev/null || true
          rm -rf build dist *.spec 2>/dev/null || true
          git add -A
          git commit -m "cleanup after build [skip ci]" 2>/dev/null || true
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main
